check_interval: 60s
evidence_window: 5m
targets:
  - 8.8.8.8
  - 1.1.1.1
relay:
  gpio_pin: 17
  off_duration: 5s
  active_low: true
recovery_window: 3m
retry:
  max_count: 5
  base_backoff: 5m
  multiplier: 2.0
deep_sleep_interval: 8h
notifications:
  ntfy_url: https://ntfy.sh
  topic: piwatchdog
  token: ""
log:
  level: info
  format: json
